substitutions:
  name: "aquarium-controler"
  friendly_name: "Akvárium Kontroler"
  wifi_ssid: "elernetik"
  wifi_password: "64030625346403062534"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags:
      - -DLV_USE_LIST=1
      - -DLV_USE_BTN=1
      - -DLV_USE_LABEL=1
      - -DBOARD_HAS_PSRAM
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288
  on_boot:
    - priority: 600
      then:
        - logger.log: "Initializing Hardware (CH422G)..."
        # CH422G Init for Backlight/Reset (Address 0x24)
        - lambda: |-
            uint8_t cmd_enable[] = {0x01, 0x01};
            id(bus_a).write(0x24, cmd_enable, 2);
        - delay: 10ms
        - lambda: |-
            uint8_t cmd_high[] = {0x00, 0xFF};
            id(bus_a).write(0x24, cmd_high, 2);
        - logger.log: "CH422G Initialized"
        
        # Apply conditional styles for LVGL widgets using lambda
        - lambda: |-
            // Apply checked style to heater button
            lv_obj_add_style(id(btn_heater), id(style_device_transparent_checked), LV_STATE_CHECKED);
            // Apply checked style to light button
            lv_obj_add_style(id(btn_light), id(style_device_transparent_checked), LV_STATE_CHECKED);
            // Apply checked style to feeder button
            lv_obj_add_style(id(btn_feeder), id(style_device_transparent_checked), LV_STATE_CHECKED);
            
            // Initial WiFi Icon State
            lv_obj_add_style(id(icon_wifi), id(style_icon_green), LV_STATE_CHECKED); // Green when checked (connected)

interval:
  - interval: 5s
    then:
      - lambda: |-
          if (id(wifi_component).is_connected()) {
             lv_obj_add_state(id(icon_wifi), LV_STATE_CHECKED);
          } else {
             lv_obj_clear_state(id(icon_wifi), LV_STATE_CHECKED);
          }

  - interval: 1s
    then:
      - lambda: |-
          // 1. Update Sidebar Temperature Display
          char buffer[16];
          sprintf(buffer, "%.1f °C", id(current_temp));
          lv_label_set_text(id(lbl_temp_val), buffer);

          // 2. Color Logic (Red if out of bounds)
          if (id(current_temp) < id(temp_min_alert) || id(current_temp) > id(temp_max_alert)) {
            lv_obj_set_style_text_color(id(lbl_temp_val), lv_color_hex(0xFF0000), 0); // Red
            lv_obj_set_style_text_color(id(lbl_temp_icon), lv_color_hex(0xFF0000), 0); // Red
          } else {
            lv_obj_set_style_text_color(id(lbl_temp_val), lv_color_hex(0x29B6F6), 0); // Blue
            lv_obj_set_style_text_color(id(lbl_temp_icon), lv_color_hex(0x29B6F6), 0); // Blue
          }

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_160: y
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: n
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: y
      CONFIG_ESPTOOLPY_FLASHFREQ_80M: y
      CONFIG_ESPTOOLPY_FLASHFREQ_120M: n
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_IDF_EXPERIMENTAL_FEATURES: y
      CONFIG_SPIRAM_SPEED_80M: y
      CONFIG_SPIRAM_SPEED_120M: n
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_COMPILER_OPTIMIZATION_PERF: y

psram:
  mode: octal
  speed: 80MHz

logger:
  baud_rate: 0

api:

web_server:
  port: 80

captive_portal:

ota:
  - platform: esphome

globals:
  - id: temp_min_alert
    type: float
    restore_value: yes
    initial_value: '22.0'
  - id: temp_max_alert
    type: float
    restore_value: yes
    initial_value: '28.0'
  - id: temp_target_day
    type: float
    restore_value: yes
    initial_value: '25.0'
  - id: temp_target_night
    type: float
    restore_value: yes
    initial_value: '23.0'
  - id: current_temp
    type: float
    restore_value: no
    initial_value: '24.5' # Simulation

